<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lista de tareas">
    <meta name="keywords" content="to do list, HTML, CSS, JavaScript">
    <meta name="author" content="Loli G.F.">
    <title>Lista de tareas</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon"/>
    <link rel="apple-touch-icon-precomposed" sizes="57x57" href="apple-touch-icon-57x57.png" />
    <link rel="apple-touch-icon-precomposed" sizes="114x114" href="apple-touch-icon-114x114.png" />
    <link rel="apple-touch-icon-precomposed" sizes="72x72" href="apple-touch-icon-72x72.png" />
    <link rel="apple-touch-icon-precomposed" sizes="144x144" href="apple-touch-icon-144x144.png" />
    <link rel="apple-touch-icon-precomposed" sizes="60x60" href="apple-touch-icon-60x60.png" />
    <link rel="apple-touch-icon-precomposed" sizes="120x120" href="apple-touch-icon-120x120.png" />
    <link rel="apple-touch-icon-precomposed" sizes="76x76" href="apple-touch-icon-76x76.png" />
    <link rel="apple-touch-icon-precomposed" sizes="152x152" href="apple-touch-icon-152x152.png" />
    <link rel="icon" type="image/png" href="favicon-196x196.png" sizes="196x196" />
    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/png" href="favicon-32x32.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="favicon-16x16.png" sizes="16x16" />
    <link rel="icon" type="image/png" href="favicon-128.png" sizes="128x128" />
    <meta name="application-name" content="&nbsp;" />
    <meta name="msapplication-TileColor" content="#FFFFFF" />
    <meta name="msapplication-TileImage" content="mstile-144x144.png" />
    <meta name="msapplication-square70x70logo" content="mstile-70x70.png" />
    <meta name="msapplication-square150x150logo" content="mstile-150x150.png" />
    <meta name="msapplication-wide310x150logo" content="mstile-310x150.png" />
    <meta name="msapplication-square310x310logo" content="mstile-310x310.png" />

    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://kit.fontawesome.com/e8ddcc3d14.js" crossorigin="anonymous"></script>
    <script src="assets/js/themes.js" defer></script>
    <script src="assets/js/main.js" defer></script>
</head>

<body>

    <div class="layout">

        <header class="header__layout">

            <div class="layout__title">
                <h1 class="list__title">
                    Tareas pendientes
                </h1>
            </div>

            <button id="theme-toggle">
                <span class="icon__dark__theme">🌙</span>
                <span class="icon__light__theme">☀️</span>
            </button>
        </header>

        <main class="list__layout">
            <form class="form">
                <input type="text" class="input__text" placeholder="✏️ Agregar tarea">
                <button type="button" class="btn__add__task">
                    <i class="fa-solid fa-plus icon__add__task"></i>
                </button>
            </form>

            <ul class="show__list__task"></ul>

            <details class="list__completed">
                <summary class="text__completed">Tareas completadas <span class="count__task__completed"></span>
                </summary>
                <ul class="completed__list__task"></ul>
            </details>
        </main>

        <footer class="footer">
            <p>Hecha con <i class='fa-solid fa-heart'></i> por Loli G.F.</p>
            <p>&copy;<span class="current__year"></span> Todos los derechos reservados</p>
        </footer>

    </div>

</body>
</html>
