<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider</title>
    <script src="https://kit.fontawesome.com/e8ddcc3d14.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="assets/js/main.js" defer></script>
</head>

<body>
    <section class="layout">

        <h1 class="layout__title">Basic Slider</h1>

        <div class="layout__slider">

            <button class="slider__btn-prev">
                <i class="fa-solid fa-chevron-left"></i>
            </button>

            <div class="slide__item slide__item--active">
                <img class="slide__img" src="assets/img/forest.png" alt="Bosque">
            </div>
            <div class="slide__item">
                <img class="slide__img" src="assets/img/lake.png" alt="Lago">
            </div>
            <div class="slide__item">
                <img class="slide__img" src="assets/img/beach.png" alt="Playa">
            </div>
            <div class="slide__item">
                <img class="slide__img" src="assets/img/mountain_lake.png" alt="Montañas y un lago">
            </div>
            <div class="slide__item">
                <img class="slide__img" src="assets/img/lavender.png" alt="Paisaje de lavanda">
            </div>
            <div class="slide__item">
                <img class="slide__img" src="assets/img/mountains.png" alt="Montañas">
            </div>

            <button class="slider__btn-next">
                <i class="fa-solid fa-chevron-right"></i>
            </button>

        </div>

    </section>
</body>

</html>
