<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Usuarios</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="layout">

        <section class="layout__section">
            <h1>Buscador de usuarios</h1>

            <input type="search" class="input__search" name="buscador" id="buscador" placeholder="Buscar usuarios...">

            <button class="btn__search">Buscar usuario</button>
            
            <p class="mensaje"></p>
        </section>

        <section class="layout__card">
            <p><span class="card__title">Nombre:</span> <span class="card__nombre"></span></p>
            <p><span class="card__title">Email:</span> <span class="card__email"></span></p>
            <p><span class="card__title">Ciudad:</span> <span class="card__ciudad"></span></p>
            <p><span class="card__title">Teléfono:</span> <span class="card__telefono"></span></p>
        </section>

    </main>

    <script src="main.js"></script>
</body>

</html>
